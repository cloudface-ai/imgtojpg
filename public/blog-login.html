<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Manager Login - imgtojpg.org</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f9fafb; }
        .card { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="card bg-white rounded-2xl p-8 w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-gray-900 rounded-xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Blog Manager</h1>
            <p class="text-gray-500 text-sm mt-1">Enter your admin token to continue</p>
        </div>

        <form id="loginForm">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Admin Token</label>
            <input
                type="password"
                id="tokenInput"
                placeholder="••••••••••••••••••••"
                autocomplete="current-password"
                class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900 mb-4"
                required
            >
            <div id="errorMsg" class="hidden text-red-600 text-sm mb-3 text-center"></div>
            <button type="submit" id="submitBtn" class="w-full bg-gray-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-400 hover:text-gray-600">← Back to site</a>
        </div>
    </div>

    <script>
        // If already authenticated, redirect
        if (localStorage.getItem('blogAdminToken')) {
            window.location.href = '/blog-manager.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const token = document.getElementById('tokenInput').value.trim();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');

            if (!token) return;

            btn.textContent = 'Verifying...';
            btn.disabled = true;
            err.classList.add('hidden');

            try {
                const res = await fetch('/api/blog-posts', {
                    headers: { 'admin-token': token }
                });
                if (res.ok) {
                    localStorage.setItem('blogAdminToken', token);
                    window.location.href = '/blog-manager.html';
                } else {
                    err.textContent = 'Invalid token. Please try again.';
                    err.classList.remove('hidden');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                    document.getElementById('tokenInput').value = '';
                }
            } catch (e) {
                err.textContent = 'Connection error. Is the server running?';
                err.classList.remove('hidden');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
